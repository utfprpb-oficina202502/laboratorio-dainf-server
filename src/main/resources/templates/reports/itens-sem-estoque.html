<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Itens Sem Estoque</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            margin: 20px;
            color: #333;
        }
        h1 {
            color: #d32f2f;
            font-size: 18px;
            margin-bottom: 5px;
        }
        .subtitulo {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .alerta {
            background-color: #ffebee;
            border-left: 4px solid #d32f2f;
            padding: 10px;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th {
            background-color: #d32f2f;
            color: white;
            padding: 10px 8px;
            text-align: left;
            font-weight: bold;
        }
        td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #ffebee;
        }
        .numero {
            text-align: right;
        }
        .rodape {
            margin-top: 20px;
            font-size: 10px;
            color: #595959;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Itens Sem Estoque</h1>
    <p class="subtitulo">UTFPR - Laboratório DAINF</p>

    <div class="alerta">
        <strong>Atenção:</strong> Os itens listados abaixo estão com saldo igual a zero e precisam de reposição.
    </div>

    <table>
        <thead>
            <tr>
                <th>Cód</th>
                <th>Nome</th>
                <th>Patrimônio</th>
                <th>SIORG</th>
                <th>Qtde Mínima</th>
                <th>Grupo</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${itens}">
                <td th:text="${item.cod}">1</td>
                <td th:text="${item.nome}">Item</td>
                <td class="numero" th:text="${item.patrimonio != null ? item.patrimonio : '-'}">-</td>
                <td class="numero" th:text="${item.siorg != null ? item.siorg : '-'}">-</td>
                <td class="numero" th:text="${item.qtdeMinima != null ? item.qtdeMinima : '-'}">0</td>
                <td th:text="${item.grupo}">Grupo</td>
            </tr>
        </tbody>
    </table>

    <p class="rodape">
        Relatório gerado em <span th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy HH:mm')}">01/01/2024 12:00</span>
    </p>
</body>
</html>
