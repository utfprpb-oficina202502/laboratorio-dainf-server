spring.flyway.enabled=true
spring.flyway.locations=classpath:/db/test
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=true

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.datasource.url=jdbc:h2:mem:db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

# Server config
server.port=0

# Test credentials (não usar env vars em testes)
google.clientId=test-client-id
utfpr.token.secret=test-token-secret-for-testing-only
utfpr.front.url=http://localhost:4200

spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.protocol=smtp
spring.mail.test-connection=false


logging.level.org.springframework.mail=WARN
logging.level.jakarta.mail=WARN
logging.level.org.eclipse.angus.mail=WARN

# Rate Limiting - desabilitado para testes
rate-limit.enabled=false